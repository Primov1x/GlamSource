name: Build and Release GlamSource
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile dalamud.zip
          Expand-Archive dalamud.zip -DestinationPath "$env:APPDATA\XIVLauncher\addon\Hooks\dev"

      - name: Restore dependencies
        run: dotnet restore GlamSource.sln

      - name: Build
        run: dotnet build GlamSource.sln --configuration Release --no-restore

      - name: Find DLL
        run: Get-ChildItem -Recurse -Filter "GlamSource.dll" | Select-Object FullName

      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path dist
          $dll = Get-ChildItem -Recurse -Filter "GlamSource.dll" | Select-Object -First 1
          Copy-Item $dll.FullName "dist\GlamSource.dll"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: v${{ github.run_number }}
          body: "Automatisch generiertes Release"
          files: dist\GlamSource.dll
