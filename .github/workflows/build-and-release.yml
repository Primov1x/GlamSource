name: Build and Release GlamSource

on:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-2025
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile dalamud.zip
          Expand-Archive dalamud.zip -DestinationPath "$env:APPDATA\XIVLauncher\addon\Hooks\dev"

      - name: Inject custom NuGet.Config
        shell: pwsh
        run: |
          # Ensure NuGet directory exists
          $nugetDir = "$env:APPDATA\NuGet"
          if (!(Test-Path $nugetDir)) { New-Item -Path $nugetDir -ItemType Directory -Force }
          # Copy repo NuGet.Config to user-wide location so dotnet restore picks it up
          $repoConfig = ".github\NuGet.Config"
          $globalConfig = "$nugetDir\NuGet.Config"
          Copy-Item $repoConfig $globalConfig -Force
          Write-Host "NuGet configured via: $globalConfig"
          # List sources for debugging
          dotnet nuget locals all --clear
          dotnet nuget list source || true

      - name: Restore dependencies
        run: dotnet restore GlamSource.sln

      - name: Build
        run: |
          dotnet build GlamSource.sln --configuration Release --no-restore
          # List Release directory contents for debugging - check all Release structures
          Write-Host "Checking for Release directory structures:";
          Get-ChildItem -Path "GlamSource/bin" -Recurse -Directory -Force | Where-Object { $_.Name -like "*Release*" } | ForEach-Object {
            Write-Host "  Found Release directory: $($_.FullName)";
            if (Test-Path "$_\GlamSource\") {
              Write-Host "    Contains GlamSource subdirectory:";
              Get-ChildItem -Path "$_\GlamSource" -Recurse -Force | ForEach-Object { Write-Host "      $($_.FullName)" };
            };
            Write-Host "    Contains files in this directory:";
            Get-ChildItem -Path $_ -Recurse -Force | ForEach-Object { Write-Host "      $($_.FullName)" };
          };

      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path dist

          # Find the Release directory - we know it's in GlamSource/bin/Release
          $release_dir = "GlamSource/bin/Release"
          Write-Host "Checking Release directory structure:";
          Get-ChildItem -Path "$release_dir" -Recurse -Force | ForEach-Object {
            if ($_.Name -like "*.dll" -or $_.Name -like "*.json") {
              Write-Host "  $($_.FullName)"
            }
          };

          # Find GlamSource.dll - SEARCH RECURSEIVELY THROUGH ALL SUBDIRECTORIES
          $dll = Get-ChildItem -Path "GlamSource/bin" -Filter "*GlamSource.dll" -Recurse -Force
          $dll = $dll | Select-Object -First 1

          if (-not $dll) {
            Write-Host "ERROR: GlamSource.dll not found. Listing all .dll files in GlamSource/bin/:";
            Get-ChildItem -Path "GlamSource/bin" -Filter "*.dll" -Recurse -Force;
            exit 1
          }
          Write-Host "Found DLL: $($dll.FullName)"
          Copy-Item $dll.FullName "dist\\GlamSource.dll"

          # Find GlamSource.json - SEARCH RECURSEIVELY THROUGH ALL SUBDIRECTORIES
          $json = Get-ChildItem -Path "GlamSource/bin" -Filter "*GlamSource.json" -Recurse -Force
          $json = $json | Select-Object -First 1

          if (-not $json) {
            Write-Host "ERROR: GlamSource.json not found. Listing all .json files in GlamSource/bin/:";
            Get-ChildItem -Path "GlamSource/bin" -Filter "*.json" -Recurse -Force;
            exit 1
          }
          Write-Host "Found JSON: $($json.FullName)"
          Copy-Item $json.FullName "dist\\GlamSource.json"

          # Create ZIP file with both DLL and JSON
          Write-Host "Creating ZIP archive..."
          Compress-Archive -Path "dist\\GlamSource.dll", "dist\\GlamSource.json" -DestinationPath "dist\\GlamSource.zip" -Force
          Write-Host "Created ZIP: dist/GlamSource.zip";

      - name: Find DLL
        run: Get-ChildItem -Recurse -Filter "dist/GlamSource.zip" | Select-Object FullName

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "LATEST"
          name: "LATEST"
          body: "Automatisch generiertes Release"
          files: dist/GlamSource.zip
          generate_release_notes: false
          overwrite: true