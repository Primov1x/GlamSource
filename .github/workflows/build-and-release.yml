name: Build and Release GlamSource

on:
  push:
    branches:
      - main

jobs:
  build:
    permissions:
      contents: write
    runs-on: windows-2025
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set Node.js 24
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/latest.zip" -OutFile dalamud.zip
          Expand-Archive dalamud.zip -DestinationPath "$env:APPDATA\XIVLauncher\addon\Hooks\dev"

      - name: Inject custom NuGet.Config
        shell: pwsh
        run: |
          # Ensure NuGet directory exists
          $nugetDir = "$env:APPDATA\NuGet"
          if (!(Test-Path $nugetDir)) { New-Item -Path $nugetDir -ItemType Directory -Force }
          # Copy repo NuGet.Config to user-wide location so dotnet restore picks it up
          $repoConfig = ".github\NuGet.Config"
          $globalConfig = "$nugetDir\NuGet.Config"
          Copy-Item $repoConfig $globalConfig -Force
          Write-Host "NuGet configured via: $globalConfig"
          # List sources for debugging
          dotnet nuget locals all --clear
          dotnet nuget list source || true

      - name: Restore dependencies
        run: |
          dotnet nuget locals all --clear
          dotnet restore GlamSource.sln

      - name: Build
        run: |
          dotnet build GlamSource.sln --configuration Release --no-restore

          # Show ALL DLL files in the entire project (debug step)
          Write-Host "BUILD DEBUG: All DLL files found:"
          Get-ChildItem -Path . -Filter "*.dll" -Recurse | Select-Object FullName

          # Show actual output files
          Write-Host "Build completed. Output files:"
          Get-ChildItem -Path "GlamSource/bin/x64/Release" -Recurse -Force

      - name: Package
        run: |
          # Create dist directory in the project root
          New-Item -ItemType Directory -Force -Path "GlamSource/dist"
          Copy-Item "GlamSource/bin/x64/Release/GlamSource/GlamSource.dll" "GlamSource/dist/GlamSource.dll"
          Copy-Item "GlamSource/bin/x64/Release/GlamSource/GlamSource.json" "GlamSource/dist/GlamSource.json"
          Compress-Archive -Path "GlamSource/dist/GlamSource.dll", "GlamSource/dist/GlamSource.json" -DestinationPath "GlamSource/dist/GlamSource.zip" -Force

      - name: Find DLL
        run: |
          Get-ChildItem -Recurse -Filter "GlamSource/dist/GlamSource.zip" -Path "${{ github.workspace }}" | Select-Object FullName

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "LATEST"
          name: "LATEST"
          body: "Automatisch generiertes Release"
          files: dist/GlamSource.zip
          generate_release_notes: false
          overwrite: true