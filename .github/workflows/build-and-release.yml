name: Build and Release GlamSource

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: microsoft/setup-dotnet@v2
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore GlamSource.sln

      - name: Build
        run: dotnet build GlamSource.sln --configuration Release

      - name: Package
        run: |
          mkdir -p dist
          copy /Y "GlamSource\bin\Release\net10\GlamSource.dll" dist\GlamSource.dll

      - name: Create GitHub Release
        uses: actions/create-release@v2
        id: release
        with:
          tag_name: v${{ env.VERSION }}
          release_name: v${{ env.VERSION }}
          body: "Automatically generated release"
          draft: false
          prerelease: false

      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: GlamSource
          path: dist\GlamSource.dll