name: Build and Release GlamSource
on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore GlamSource.sln

      - name: Build
        run: dotnet build GlamSource.sln --configuration Release --no-restore

      - name: Package
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "GlamSource\bin\Release\net10.0\GlamSource.dll" "dist\GlamSource.dll"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: v${{ github.run_number }}
          body: "Automatisch generiertes Release"
          files: dist\GlamSource.dll
